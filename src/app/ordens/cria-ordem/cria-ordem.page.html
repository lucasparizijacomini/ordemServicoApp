<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Nova Ordem de Serviço</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="container">
    <form>

      <!-- SEÇÃO: Informações do Veículo -->
      <div class="section-card">
        <div class="section-header">
          <ion-icon name="car-sport-outline"></ion-icon>
          <h2>Informações do Veículo</h2>
        </div>

        <ion-item lines="full">
          <ion-input
            label="Modelo *"
            labelPlacement="floating"
            placeholder="Ex: 92UK"
            [(ngModel)]="ordem.modelo"
            name="modelo"
            required>
          </ion-input>
        </ion-item>

        <ion-item lines="full">
          <ion-input
            label="Frota *"
            labelPlacement="floating"
            placeholder="Ex: 3030"
            [(ngModel)]="ordem.frota"
            name="frota"
            type="number"
            required>
          </ion-input>
        </ion-item>

        <ion-item lines="none">
          <ion-input
            label="Hodômetro (km) *"
            labelPlacement="floating"
            placeholder="Ex: 125.000"
            [(ngModel)]="ordem.hodometro"
            name="hodometro"
            type="number"
            required>
          </ion-input>
        </ion-item>
      </div>

      <!-- SEÇÃO: Detalhes da Manutenção -->
      <div class="section-card">
        <div class="section-header">
          <ion-icon name="construct-outline"></ion-icon>
          <h2>Detalhes da Manutenção</h2>
        </div>

        <ion-item lines="full">
          <ion-input
            label="Local *"
            labelPlacement="floating"
            placeholder="Ex: Garagem A"
            [(ngModel)]="ordem.local"
            name="local"
            required>
          </ion-input>
        </ion-item>

        <ion-item lines="none">
          <ion-select
            label="Tipo de Manutenção *"
            labelPlacement="floating"
            placeholder="Selecione"
            [(ngModel)]="ordem.tipoManutencao"
            name="tipoManutencao"
            interface="popover">
            <ion-select-option value="1">
              <ion-icon name="warning-outline"></ion-icon> Corretiva
            </ion-select-option>
            <ion-select-option value="2">
              <ion-icon name="calendar-outline"></ion-icon> Preventiva
            </ion-select-option>
          </ion-select>
        </ion-item>
      </div>

      <!-- SEÇÃO: Problemas -->
      <div class="section-card problemas-section">
        <div class="section-header">
          <ion-icon name="alert-circle-outline"></ion-icon>
          <h2>Problemas Identificados</h2>
          <ion-badge color="primary">{{ ordem.problemas.length || 0 }}</ion-badge>
        </div>

        <ion-button
          expand="block"
          fill="outline"
          (click)="openModalProblema()"
          class="add-problema-btn">
          <ion-icon slot="start" name="add-circle-outline"></ion-icon>
          Adicionar Problema
        </ion-button>

        <!-- Lista de Problemas -->
        <div class="problemas-list" *ngIf="ordem.problemas.length > 0">
          <ion-card *ngFor="let p of ordem.problemas; let i = index" class="problema-card">
            <ion-card-content>
              <div class="problema-header">
                <div class="problema-tipo">
                  <ion-icon name="build-outline"></ion-icon>
                  <strong>{{ p.tipo }}</strong>
                </div>
                <ion-button
                  fill="clear"
                  color="danger"
                  size="small"
                  (click)="removerProblema(i)">
                  <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
                </ion-button>
              </div>

              <div class="problema-info">
                <p><ion-icon name="flag-outline"></ion-icon> <strong>Situação:</strong> {{ p.situacao }}</p>
                <p *ngIf="p.observacao"><ion-icon name="document-text-outline"></ion-icon> <strong>Observação:</strong> {{ p.observacao }}</p>
              </div>

              <!-- MINIATURA DA IMAGEM -->
              <div *ngIf="p.fotoUrl" class="problema-thumb">
                <img [src]="p.fotoUrl" />
              </div>
            </ion-card-content>
          </ion-card>
        </div>

        <div class="empty-state" *ngIf="!ordem.problemas || ordem.problemas.length === 0">
          <ion-icon name="clipboard-outline"></ion-icon>
          <p>Nenhum problema adicionado</p>
        </div>
      </div>

      <!-- Botão de Finalizar -->
      <ion-button
        expand="block"
        size="large"
        (click)="finalizarOS()"
        class="finalizar-btn">
        <ion-icon slot="start" name="checkmark-circle-outline"></ion-icon>
        Abrir Ordem de Serviço
      </ion-button>

    </form>
  </div>
</ion-content>
